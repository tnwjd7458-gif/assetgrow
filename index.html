<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssetGrow - 자산관리</title>
    <style>
        /* [기존 CSS 복사해서 넣기] */
    </style>
</head>
<body>
<div id="app">
    </div>

<script>
// --- [여기서부터 스크립트를 새로 붙여넣으세요] ---

// 1. 데이터 저장소 초기화
let transactions = JSON.parse(localStorage.getItem('assetgrow_transactions') || '[]');
let monthlyBudget = parseInt(localStorage.getItem('assetgrow_budget') || '1200000');
const SAVE_GOAL = 1000000;

// 2. 앱 시작 시 실행
window.onload = function() {
    tick(); // 시계
    updateAllDisplays();
    if(typeof drawV === 'function') drawV();
    if(typeof drawE === 'function') drawE();
};

// 3. 통합 업데이트 (모든 UI 반영)
function updateAllDisplays() {
    const now = new Date();
    const thisMonth = now.getMonth();
    const currentMonthTxs = transactions.filter(t => new Date(t.date).getMonth() === thisMonth);
    
    const totalExpense = currentMonthTxs.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
    const totalIncome = currentMonthTxs.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
    const totalSaved = Math.max(0, totalIncome - totalExpense);

    // 지출액 표시
    const budgetAmtEl = document.querySelector('.budget-amount');
    if(budgetAmtEl) budgetAmtEl.innerText = `₩${totalExpense.toLocaleString()}`;

    // 예산 바 업데이트
    const pct = Math.min(100, (totalExpense / monthlyBudget) * 100);
    const bar = document.getElementById('homeBudgetBar');
    if(bar) bar.style.width = pct + '%';

    // 서브 텍스트
    const subEl = document.querySelector('.budget-sub');
    if(subEl) subEl.innerText = `예산 ${toK(monthlyBudget)} 중 ${pct.toFixed(1)}% 사용 · ${toK(monthlyBudget - totalExpense)} 남음`;

    // 저축/지출 게임 레벨 업데이트
    updateLevels(totalSaved, totalExpense);
    renderHomeTx();
}

// 4. 레벨 업데이트 함수
function updateLevels(saved, exp) {
    const sPct = Math.min(100, Math.round((saved / SAVE_GOAL) * 100));
    const sPctEl = document.getElementById('sPct');
    if(sPctEl) sPctEl.textContent = sPct + '%';
    
    const sBar = document.getElementById('sBar');
    if(sBar) sBar.style.width = sPct + '%';

    // 저축 아이템 진화
    vIdx = sPct >= 100 ? 4 : sPct >= 60 ? 3 : sPct >= 30 ? 2 : sPct >= 10 ? 1 : 0;
    if(typeof drawV === 'function') drawV();

    // 지출 아이템 진화 (복주머니/깡통)
    eIdx = exp <= 200000 ? 0 : exp <= 500000 ? 1 : exp <= 800000 ? 2 : exp <= 1050000 ? 3 : 4;
    if(typeof drawE === 'function') drawE();
}

// 5. [중요] 실제 데이터 저장 함수 (qDone에서 호출됨)
function qDone() {
    const amt = parseInt(qRaw) || 0;
    if (!amt || !qCat) {
        showToast("금액과 카테고리를 선택해주세요!");
        return;
    }

    const cat = CATS.find(c => c.id === qCat);
    const memo = document.getElementById('memoInput').value.trim();

    const tx = {
        id: Date.now(),
        date: new Date().toISOString(),
        merchant: memo || cat.name,
        amount: amt,
        type: qType,
        category: cat.name,
        catId: qCat
    };

    transactions.unshift(tx);
    localStorage.setItem('assetgrow_transactions', JSON.stringify(transactions));

    updateAllDisplays();
    showSuccessScreen(tx, cat, memo);
    qRaw = ''; // 입력 초기화
}

// 6. 최근 거래 리스트 (삭제 기능 포함)
function renderHomeTx() {
    const listEl = document.getElementById('homeTxList');
    if(!listEl) return;
    
    listEl.innerHTML = transactions.slice(0, 10).map(t => `
        <div class="tx-item" onclick="deleteTx(${t.id})">
            <div class="tx-icon" style="background:var(--pp)">${getCatIcon(t.catId)}</div>
            <div class="tx-info">
                <div class="tx-name">${t.merchant}</div>
                <div class="tx-cat">${t.category}</div>
            </div>
            <div class="tx-right">
                <div class="tx-amt" style="color:${t.type==='expense'?'#A32D2D':'#1D9E75'}">
                    ${t.type==='expense'?'-':'+'}${t.amount.toLocaleString()}원
                </div>
            </div>
        </div>
    `).join('');
}

function deleteTx(id) {
    if(confirm('기록을 삭제할까요?')) {
        transactions = transactions.filter(x => x.id !== id);
        localStorage.setItem('assetgrow_transactions', JSON.stringify(transactions));
        updateAllDisplays();
        showToast("삭제 완료!");
    }
}

// 기존에 있던 tick, toK, showToast, drawV, drawE 등의 유틸리티 함수들은 그대로 유지하세요!
</script>
</body>
</html>
