<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3C3489">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AssetGrow">
<title>AssetGrow</title>
<style>
/* 원본 CSS 그대로 유지 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0effe;}
:root{ --p:#3C3489;--pl:#7F77DD;--pp:#EEEDFE;--pm:#CECBF6; --t:#1D9E75;--tl:#9FE1CB;--tp:#E1F5EE; --coral:#D85A30;--amber:#BA7517; --bg:#F8F7FF;--card:#fff;--card2:#F8F7FF; --b1:#E8E6FF;--tx1:#1a1830;--tx2:#6b6890;--tx3:#9896B8; --r8:8px;--r12:12px;--r16:16px; --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px); }
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(68px + var(--safe-bottom));}
.screen::-webkit-scrollbar{display:none;}
.sbar{padding:calc(var(--safe-top) + 10px) 18px 4px;display:flex;justify-content:space-between;align-items:center;background:var(--card);}
.stime{font-size:14px;font-weight:600;color:var(--tx1);}
.sicons{font-size:14px;color:var(--tx3);display:flex;gap:4px;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 18px 12px;background:var(--card);}
.brand{font-size:20px;font-weight:700;letter-spacing:-.5px;}.brand .a{color:var(--tx1);}.brand .g{color:var(--t);}
.sync-pill{display:flex;align-items:center;gap:5px;background:var(--tp);border:1px solid rgba(29,158,117,.25);border-radius:20px;padding:5px 12px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--t);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-text{font-size:11px;color:var(--t);font-weight:600;}
.card, .card-p, .card-t, .card-a, .card-d{background:var(--card);border:1px solid var(--b1);border-radius:var(--r16);padding:16px;margin:0 14px 10px;}
.card-p{background:var(--pp);border:1px solid var(--pm);}
.budget-label{font-size:11px;font-weight:600;color:var(--pl);margin-bottom:4px;}
.budget-amount{font-size:34px;font-weight:700;color:var(--tx1);letter-spacing:-1px;margin-bottom:3px;}
.budget-sub{font-size:12px;color:var(--tx2);margin-bottom:10px;}
.bar-bg{background:var(--pm);border-radius:6px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;background:var(--p);transition:width .8s cubic-bezier(.4,0,.2,1);}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-top:4px;}
.game-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:0 14px 10px;}
.game-box{background:var(--card);border:1px solid var(--b1);border-radius:var(--r12);padding:12px;}
.vstage, .estage{background:var(--pp);border-radius:10px;padding:10px 6px 8px;text-align:center;margin-bottom:7px;border:1px solid var(--pm);}
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:0 14px 10px;}
.stat-box{background:var(--card);border:1px solid var(--b1);border-radius:var(--r12);padding:12px;}
.stat-value{font-size:17px;font-weight:700;color:var(--tx1);margin:2px 0;}
.tx-list{margin:0 14px;}
.tx-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--b1);cursor:pointer;}
.bottom-nav{display:flex;background:var(--card);border-top:1px solid var(--b1);padding:6px 0 calc(6px + var(--safe-bottom));position:absolute;bottom:0;left:0;right:0;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;border:none;background:none;}
.nav-center-btn{width:50px;height:50px;background:var(--p);border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;cursor:pointer;margin-top:-16px;}
.page{display:none;}.page.active{display:block;}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:88px;background:var(--p);color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
.qi-amt{font-size:38px;font-weight:700;text-align:center;padding:20px;}
.numpad-qi{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:10px 14px;}
.qnk, .nk{background:var(--card2);border:1.5px solid var(--b1);border-radius:var(--r12);height:52px;font-size:20px;font-weight:600;cursor:pointer;}
.done-btn{margin:10px 14px;width:calc(100% - 28px);border-radius:var(--r16);padding:15px 0;font-size:15px;font-weight:700;border:none;color:#fff;cursor:pointer;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 14px;}
.cat-btn{border:1.5px solid var(--b1);border-radius:var(--r12);padding:8px;text-align:center;cursor:pointer;}
.cat-btn.sel{border-color:var(--pl);background:var(--pp);}
</style>
</head>
<body>
<div id="app">
    <div id="toastEl" class="toast"></div>

    <div class="screen page active" id="page-home">
        <div class="sbar"><span class="stime" id="clk1">9:41</span></div>
        <div class="topbar"><div class="brand"><span class="a">Asset</span><span class="g">Grow</span></div><div class="sync-pill"><div class="sync-dot"></div><span class="sync-text">Smart Sync</span></div></div>
        <div class="card-p">
            <div class="budget-label">이번 달 지출 · 5월</div>
            <div class="budget-amount" id="mainExp">₩0</div>
            <div class="budget-sub" id="mainSub">예산 120만원 중 0% 사용</div>
            <div class="bar-bg"><div class="bar-fill" id="homeBudgetBar" style="width:0%"></div></div>
            <div class="bar-labels"><span>₩0</span><span id="remLabel">120만원 남음</span><span>120만원</span></div>
        </div>
        <div class="game-row">
            <div class="game-box">
                <div class="vstage"><svg id="vSvg" width="80" height="40" viewBox="0 0 80 44"></svg><div class="stage-name vname" id="vName">리어카</div><div class="stage-sub vsub" id="vSub">저축 0%</div></div>
                <div class="mini-prog-row"><span class="mini-pl">이번 달 저축</span><span class="mini-pp" id="sPct">0%</span></div>
                <div class="mini-bar-bg"><div class="mini-bar-fill" id="sBar" style="width:0%;background:var(--p)"></div></div>
                <div class="next-box" style="background:var(--p); color:#fff; font-size:9px; padding:5px; border-radius:5px;"><span id="sNext">₩100,000 모으면 자전거!</span></div>
            </div>
            <div class="game-box">
                <div class="estage"><svg id="eSvg" width="80" height="40" viewBox="0 0 80 44"></svg><div class="stage-name ename" id="eName">복주머니</div><div class="stage-sub esub" id="eSub">지출 적음</div></div>
                <div class="mini-prog-row"><span class="mini-pl">지출 상태</span><span class="mini-pp" id="ePct">안전</span></div>
                <div class="mini-bar-bg"><div class="mini-bar-fill" id="eBar" style="width:0%;background:var(--coral)"></div></div>
                <div class="next-box" style="background:var(--coral); color:#fff; font-size:9px; padding:5px; border-radius:5px;"><span id="eNext">줄일수록 아이템이 좋아져!</span></div>
            </div>
        </div>
        <div class="stat-grid">
            <div class="stat-box"><div>수입</div><div class="stat-value" id="stInc" style="color:var(--t)">0원</div></div>
            <div class="stat-box"><div>지출</div><div class="stat-value" id="stExp" style="color:var(--coral)">0원</div></div>
        </div>
        <div class="tx-list" id="homeTxList"></div>
    </div>

    <div class="screen page" id="page-input">
        <div class="qi-header"><div class="qi-amt" id="qiAmt">0원</div></div>
        <div class="cat-grid" id="catGrid"></div>
        <div class="numpad-qi">
            <button class="qnk" onclick="tap('1')">1</button><button class="qnk" onclick="tap('2')">2</button><button class="qnk" onclick="tap('3')">3</button>
            <button class="qnk" onclick="tap('4')">4</button><button class="qnk" onclick="tap('5')">5</button><button class="qnk" onclick="tapNum('6')">6</button>
            <button class="qnk" onclick="tap('7')">7</button><button class="qnk" onclick="tap('8')">8</button><button class="qnk" onclick="tap('9')">9</button>
            <button class="qnk" onclick="tap('00')">00</button><button class="qnk" onclick="tap('0')">0</button><button class="qnk" onclick="tap('del')">←</button>
        </div>
        <div style="display:flex; gap:10px; padding:0 14px;">
            <button class="done-btn" style="background:var(--t); flex:1" onclick="save('income')">수입</button>
            <button class="done-btn" style="background:var(--p); flex:1" onclick="save('expense')">지출</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn" onclick="goPage('home')">🏠<span style="font-size:10px">홈</span></button>
        <button class="nav-center-btn" onclick="goPage('input')">+</button>
        <button class="nav-btn" onclick="showToast('분석 준비중!')">📊<span style="font-size:10px">분석</span></button>
    </nav>
</div>

<script>
let txs = JSON.parse(localStorage.getItem('ag_txs') || '[]');
let budget = 1200000;
let curInput = ""; let curCat = "";

const CATS = [
    {id:'food', icon:'🍚', name:'식비'}, {id:'cafe', icon:'☕', name:'카페'},
    {id:'delivery', icon:'🛵', name:'배달'}, {id:'shopping', icon:'🛍️', name:'쇼핑'}
];

const vehicles = [
    {name:'리어카', min:0, draw:s=>s.innerHTML='<rect x="10" y="28" width="60" height="10" rx="3" fill="#B4B2A9"/><circle cx="20" cy="40" r="5" fill="#5F5E5A"/><circle cx="55" cy="40" r="5" fill="#5F5E5A"/>'},
    {name:'자전거', min:10, draw:s=>s.innerHTML='<circle cx="22" cy="34" r="10" fill="none" stroke="#1D9E75" stroke-width="2"/><circle cx="58" cy="34" r="10" fill="none" stroke="#1D9E75" stroke-width="2"/>'},
    {name:'자동차', min:60, draw:s=>s.innerHTML='<rect x="8" y="26" width="64" height="14" rx="4" fill="#378ADD"/><circle cx="20" cy="41" r="6" fill="#185FA5"/><circle cx="60" cy="41" r="6" fill="#185FA5"/>'}
];

function goPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    if(id==='home') update();
}

function tap(k) {
    if(k==='del') curInput = curInput.slice(0,-1);
    else if(curInput.length < 9) curInput += k;
    document.getElementById('qiAmt').innerText = (parseInt(curInput)||0).toLocaleString() + "원";
}

function save(type) {
    if(!curInput || !curCat) return alert("금액과 카테고리를 선택하세요!");
    txs.unshift({id:Date.now(), amt:parseInt(curInput), cat:curCat, type:type, date:new Date().toISOString()});
    localStorage.setItem('ag_txs', JSON.stringify(txs));
    curInput=""; curCat=""; goPage('home'); showToast("기록 완료!");
}

function update() {
    const m = new Date().getMonth();
    const mtx = txs.filter(t => new Date(t.date).getMonth() === m);
    const exp = mtx.filter(t => t.type==='expense').reduce((a,b)=>a+b.amt,0);
    const inc = mtx.filter(t => t.type==='income').reduce((a,b)=>a+b.amt,0);
    const sav = Math.max(0, inc-exp);

    document.getElementById('mainExp').innerText = "₩" + exp.toLocaleString();
    document.getElementById('stExp').innerText = exp.toLocaleString() + "원";
    document.getElementById('stInc').innerText = inc.toLocaleString() + "원";
    
    const pct = Math.min(100, (exp/budget)*100);
    document.getElementById('homeBudgetBar').style.width = pct + "%";
    document.getElementById('mainSub').innerText = `예산 120만원 중 ${pct.toFixed(1)}% 사용`;
    document.getElementById('remLabel').innerText = (budget-exp).toLocaleString() + "원 남음";

    // 리어카 진화
    const sPct = Math.min(100, Math.round((sav/1000000)*100));
    document.getElementById('sPct').innerText = sPct + "%";
    document.getElementById('sBar').style.width = sPct + "%";
    const v = vehicles.filter(x => sPct >= x.min).pop();
    document.getElementById('vName').innerText = v.name;
    v.draw(document.getElementById('vSvg'));

    // 복주머니 진화
    const eIdx = exp > 1000000 ? 4 : exp > 700000 ? 3 : exp > 400000 ? 2 : 0;
    const eNames = ["복주머니", "저금통", "얇은지갑", "빈깡통", "폭발"];
    document.getElementById('eName').innerText = eNames[eIdx];
    document.getElementById('eBar').style.width = pct + "%";

    document.getElementById('homeTxList').innerHTML = txs.slice(0,5).map(t => `
        <div class="tx-item" onclick="if(confirm('삭제?')){txs=txs.filter(x=>x.id!==${t.id});localStorage.setItem('ag_txs',JSON.stringify(txs));update();}">
            <div style="font-size:20px; margin-right:10px">${CATS.find(c=>c.id===t.cat)?.icon||'💰'}</div>
            <div style="flex:1"><b>${CATS.find(c=>c.id===t.cat)?.name||'수입'}</b><br><small>${new Date(t.date).toLocaleDateString()}</small></div>
            <div style="color:${t.type==='expense'?'#A32D2D':'#1D9E75'}">${t.type==='expense'?'-':'+'}${t.amt.toLocaleString()}원</div>
        </div>
    `).join('');
}

function renderCats() {
    document.getElementById('catGrid').innerHTML = CATS.map(c => `<div class="cat-btn ${curCat===c.id?'sel':''}" onclick="curCat='${c.id}';renderCats();"><span>${c.icon}</span><br><small>${c.name}</small></div>`).join('');
}

function showToast(m) { const t=document.getElementById('toastEl'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function toK(n){ return (n/10000) + "만원"; }
function tick(){ const t=new Date(); document.getElementById('clk1').innerText = t.getHours()+":"+String(t.getMinutes()).padStart(2,'0'); }

renderCats(); update(); tick(); setInterval(tick, 1000);
</script>
</body>
</html>
