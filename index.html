<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AssetGrow</title>
<style>
/* --- 기존 디자인 CSS --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0effe;}
:root{ --p:#3C3489;--pl:#7F77DD;--pp:#EEEDFE;--pm:#CECBF6; --t:#1D9E75;--tl:#9FE1CB;--tp:#E1F5EE; --coral:#D85A30;--amber:#BA7517; --bg:#F8F7FF;--card:#fff;--card2:#F8F7FF; --b1:#E8E6FF;--tx1:#1a1830;--tx2:#6b6890;--tx3:#9896B8; --r8:8px;--r12:12px;--r16:16px; --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px); }
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);position:relative;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(80px + var(--safe-bottom));}
.sbar{padding:calc(var(--safe-top) + 10px) 18px 4px;display:flex;justify-content:space-between;align-items:center;background:var(--card);}
.stime{font-size:14px;font-weight:600;color:var(--tx1);}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 18px 12px;background:var(--card);}
.brand{font-size:20px;font-weight:700;letter-spacing:-.5px;}.brand .a{color:var(--tx1);}.brand .g{color:var(--t);}
.card-p{background:var(--pp);border:1px solid var(--pm);border-radius:var(--r16);padding:16px;margin:0 14px 10px;}
.budget-label{font-size:11px;font-weight:600;color:var(--pl);margin-bottom:4px;}
.budget-amount{font-size:34px;font-weight:700;color:var(--tx1);letter-spacing:-1px;margin-bottom:3px;cursor:pointer;}
.budget-sub{font-size:12px;color:var(--tx2);margin-bottom:10px;}
.bar-bg{background:var(--pm);border-radius:6px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;background:var(--p);transition:width .8s ease;}
.game-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 14px 10px;}
.game-box{background:var(--card);border:1px solid var(--b1);border-radius:var(--r12);padding:12px;}
.vstage, .estage{background:var(--pp);border-radius:10px;padding:10px;text-align:center;margin-bottom:7px;border:1px solid var(--pm);min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 10px;}
.stat-box{background:var(--card);border:1px solid var(--b1);border-radius:var(--r12);padding:12px;}
.stat-value{font-size:17px;font-weight:700;color:var(--tx1);}
.tx-list{margin:0 14px;}
.tx-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--b1);cursor:pointer;}
.tx-info{flex:1;}.tx-name{font-size:13px;font-weight:600;}.tx-amt{font-size:13px;font-weight:700;text-align:right;}
.bottom-nav{display:flex;background:var(--card);border-top:1px solid var(--b1);padding:6px 0 calc(6px + var(--safe-bottom));position:absolute;bottom:0;width:100%;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;}
.nav-center-btn{width:50px;height:50px;background:var(--p);border-radius:50%;color:#fff;font-size:26px;border:none;margin-top:-20px;cursor:pointer;}
.page{display:none;}.page.active{display:block;}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:100px;background:var(--p);color:#fff;padding:10px 20px;border-radius:20px;opacity:0;transition:0.3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;}
.qi-header{padding:20px; text-align:center; background:#fff;}
.numpad-qi{display:grid; grid-template-columns:repeat(3,1fr); gap:5px; padding:15px;}
.qnk{height:55px; border-radius:12px; border:1px solid var(--b1); background:#fff; font-size:20px; font-weight:600; cursor:pointer;}
.done-btn{width:calc(100% - 30px); margin:15px; padding:15px; border-radius:15px; border:none; background:var(--p); color:#fff; font-size:16px; font-weight:700; cursor:pointer;}
.cat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:15px;}
.cat-btn{padding:10px; border:1px solid var(--b1); border-radius:12px; text-align:center; cursor:pointer;}
.cat-btn.sel{background:var(--pp); border-color:var(--p);}
</style>
</head>
<body>
<div id="app">
    <div id="toastEl" class="toast"></div>

    <div class="screen page active" id="page-home">
        <div class="sbar"><span class="stime" id="clk1">9:41</span></div>
        <div class="topbar"><div class="brand"><span class="a">Asset</span><span class="g">Grow</span></div></div>
        <div class="card-p">
            <div class="budget-label">이번 달 지출</div>
            <div class="budget-amount" id="mainExpenseDisplay" onclick="changeBudget()">₩0</div>
            <div class="budget-sub" id="mainBudgetSub">예산 설정이 필요해요</div>
            <div class="bar-bg"><div class="bar-fill" id="homeBudgetBar" style="width:0%"></div></div>
        </div>
        <div class="game-row">
            <div class="game-box">
                <div class="vstage"><svg id="vSvg" width="60" height="30"></svg><div id="vName" style="font-size:12px;font-weight:700">리어카</div></div>
                <div style="font-size:10px; color:var(--tx3)">저축률 <span id="sPct">0%</span></div>
            </div>
            <div class="game-box">
                <div class="estage"><svg id="eSvg" width="60" height="30"></svg><div id="eName" style="font-size:12px;font-weight:700">복주머니</div></div>
                <div style="font-size:10px; color:var(--tx3)">지출상태 <span id="eStatus">안전</span></div>
            </div>
        </div>
        <div class="stat-grid">
            <div class="stat-box"><div>수입</div><div class="stat-value" id="stInc" style="color:var(--t)">₩0</div></div>
            <div class="stat-box"><div>지출</div><div class="stat-value" id="stExp" style="color:var(--coral)">₩0</div></div>
        </div>
        <div class="tx-list" id="homeTxList"></div>
    </div>

    <div class="screen page" id="page-input">
        <div class="qi-header">
            <div style="font-size:12px; color:var(--tx3)">얼마나 썼나요?</div>
            <div style="font-size:32px; font-weight:700;" id="qiAmtDisplay">0원</div>
        </div>
        <div class="cat-grid" id="catGrid"></div>
        <div class="numpad-qi">
            <button class="qnk" onclick="tapNum('1')">1</button><button class="qnk" onclick="tapNum('2')">2</button><button class="qnk" onclick="tapNum('3')">3</button>
            <button class="qnk" onclick="tapNum('4')">4</button><button class="qnk" onclick="tapNum('5')">5</button><button class="qnk" onclick="tapNum('6')">6</button>
            <button class="qnk" onclick="tapNum('7')">7</button><button class="qnk" onclick="tapNum('8')">8</button><button class="qnk" onclick="tapNum('9')">9</button>
            <button class="qnk" onclick="tapNum('00')">00</button><button class="qnk" onclick="tapNum('0')">0</button><button class="qnk" onclick="tapNum('del')">←</button>
        </div>
        <div style="display:flex; gap:10px; padding: 0 15px;">
            <button class="done-btn" style="background:var(--t); flex:1;" onclick="saveData('income')">수입 기록</button>
            <button class="done-btn" style="background:var(--p); flex:1;" onclick="saveData('expense')">지출 기록</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn" onclick="goPage('home')">🏠<span style="font-size:10px">홈</span></button>
        <button class="nav-center-btn" onclick="goPage('input')">+</button>
        <button class="nav-btn" onclick="showToast('분석 기능 준비중!')">📊<span style="font-size:10px">분석</span></button>
    </nav>
</div>

<script>
// --- 데이터 로직 ---
let txs = JSON.parse(localStorage.getItem('assetgrow_txs') || '[]');
let myBudget = parseInt(localStorage.getItem('assetgrow_budget') || '1200000');
let curInput = "";
let curCat = "";
let vIdx = 0;
let eIdx = 0;

const CATS = [
    {id:'food', name:'식비', icon:'🍚'}, {id:'cafe', name:'카페', icon:'☕'},
    {id:'transport', name:'교통', icon:'🚌'}, {id:'shopping', name:'쇼핑', icon:'🛍️'},
    {id:'etc', name:'기타', icon:'📌'}
];

function tick(){
    const n = new Date();
    const t = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    document.getElementById('clk1').textContent = t;
}
setInterval(tick, 1000);

function goPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    if(id === 'home') updateHome();
}

function tapNum(n) {
    if(n === 'del') curInput = curInput.slice(0, -1);
    else if(curInput.length < 9) curInput += n;
    document.getElementById('qiAmtDisplay').innerText = (parseInt(curInput) || 0).toLocaleString() + "원";
}

function selectCat(id) {
    curCat = id;
    renderCats();
}

function renderCats() {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = CATS.map(c => `
        <div class="cat-btn ${curCat === c.id ? 'sel' : ''}" onclick="selectCat('${c.id}')">
            <div style="font-size:20px">${c.icon}</div>
            <div style="font-size:10px">${c.name}</div>
        </div>
    `).join('');
}

function saveData(type) {
    const amt = parseInt(curInput);
    if(!amt || !curCat) return alert("금액과 카테고리를 확인해주세요!");
    
    const newTx = {
        id: Date.now(),
        amt: amt,
        cat: curCat,
        date: new Date().toISOString(),
        type: type
    };
    
    txs.unshift(newTx);
    localStorage.setItem('assetgrow_txs', JSON.stringify(txs));
    
    curInput = ""; curCat = "";
    document.getElementById('qiAmtDisplay').innerText = "0원";
    showToast(type === 'income' ? "수입 기록 완료!" : "지출 기록 완료!");
    goPage('home');
}

function updateHome() {
    const now = new Date();
    const monthTxs = txs.filter(t => new Date(t.date).getMonth() === now.getMonth());
    
    const totalExp = monthTxs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amt, 0);
    const totalInc = monthTxs.filter(t => t.type === 'income').reduce((s, t) => s + t.amt, 0);
    const totalSaved = Math.max(0, totalInc - totalExp);

    document.getElementById('mainExpenseDisplay').innerText = "₩" + totalExp.toLocaleString();
    document.getElementById('stExp').innerText = "₩" + totalExp.toLocaleString();
    document.getElementById('stInc').innerText = "₩" + totalInc.toLocaleString();
    
    const pct = Math.min(100, (totalExp / myBudget) * 100);
    document.getElementById('homeBudgetBar').style.width = pct + "%";
    document.getElementById('mainBudgetSub').innerText = `예산 ${myBudget.toLocaleString()}원 중 ${pct.toFixed(1)}% 사용`;

    // 저축/지출 레벨 업데이트
    const sPct = Math.min(100, Math.round((totalSaved / 1000000) * 100));
    document.getElementById('sPct').innerText = sPct + "%";
    vIdx = sPct >= 100 ? 4 : sPct >= 60 ? 3 : sPct >= 30 ? 2 : sPct >= 10 ? 1 : 0;
    
    eIdx = totalExp <= 200000 ? 0 : totalExp <= 500000 ? 1 : totalExp <= 800000 ? 2 : totalExp <= 1050000 ? 3 : 4;
    const eStatuses = ["안전", "양호", "주의", "위험", "폭발"];
    document.getElementById('eStatus').innerText = eStatuses[eIdx];

    drawV(); drawE();

    // 리스트 렌더링
    const list = document.getElementById('homeTxList');
    list.innerHTML = txs.slice(0, 8).map(t => `
        <div class="tx-item" onclick="deleteItem(${t.id})">
            <div style="font-size:24px; margin-right:10px">${CATS.find(c=>c.id===t.cat)?.icon || '💰'}</div>
            <div class="tx-info">
                <div class="tx-name">${CATS.find(c=>c.id===t.cat)?.name || (t.type==='income'?'수입':'기타')}</div>
                <div style="font-size:11px; color:#9896B8">${new Date(t.date).toLocaleDateString()}</div>
            </div>
            <div class="tx-amt" style="color:${t.type==='expense'?'#A32D2D':'#1D9E75'}">${t.type==='expense'?'-':'+'} ${t.amt.toLocaleString()}원</div>
        </div>
    `).join('');
}

function drawV() {
    const s = document.getElementById('vSvg'); if(!s) return;
    if(vIdx === 0) s.innerHTML = '<rect x="10" y="15" width="40" height="8" rx="2" fill="#B4B2A9"/><circle cx="15" cy="23" r="4" fill="#5F5E5A"/><circle cx="45" cy="23" r="4" fill="#5F5E5A"/>';
    else if(vIdx >= 4) s.innerHTML = '<rect x="5" y="10" width="50" height="12" rx="4" fill="#E24B4A"/><circle cx="15" cy="22" r="5" fill="#791F1F"/><circle cx="45" cy="22" r="5" fill="#791F1F"/>';
    else s.innerHTML = '<circle cx="20" cy="15" r="8" fill="none" stroke="#1D9E75" stroke-width="2"/><circle cx="40" cy="15" r="8" fill="none" stroke="#1D9E75" stroke-width="2"/><line x1="20" y1="15" x2="40" y2="15" stroke="#1D9E75" stroke-width="2"/>';
}

function drawE() {
    const s = document.getElementById('eSvg'); if(!s) return;
    if(eIdx === 0) s.innerHTML = '<ellipse cx="30" cy="15" rx="15" ry="12" fill="#ED93B1"/><text x="30" y="19" text-anchor="middle" font-size="10" fill="#72243E" font-weight="700">복</text>';
    else s.innerHTML = '<rect x="20" y="8" width="20" height="18" rx="2" fill="#B4B2A9"/><line x1="23" y1="12" x2="37" y2="22" stroke="#5F5E5A" stroke-width="2"/><line x1="37" y1="12" x2="23" y2="22" stroke="#5F5E5A" stroke-width="2"/>';
}

function deleteItem(id) {
    if(confirm("기록을 삭제할까요?")) {
        txs = txs.filter(t => t.id !== id);
        localStorage.setItem('assetgrow_txs', JSON.stringify(txs));
        updateHome();
    }
}

function changeBudget() {
    const b = prompt("이번 달 목표 예산을 입력하세요.", myBudget);
    if(b) {
        myBudget = parseInt(b);
        localStorage.setItem('assetgrow_budget', myBudget);
        updateHome();
    }
}

function showToast(m) {
    const t = document.getElementById('toastEl');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

renderCats();
updateHome();
tick();
</script>
</body>
</html>
